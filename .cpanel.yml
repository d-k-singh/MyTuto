---
# cPanel Git Version Control deployment file.
# Docs: https://api.docs.cpanel.net/guides/guide-to-deployment-git-version-control/
#
# Build strategy: PRE-BUILT. The web/.next production build is created
# locally (npm run build) and committed to git — the server never runs
# `next build`. This is deliberate: this project's build toolchain
# (TypeScript + Tailwind v4 + ESLint) was getting OOM/CPU-killed under
# this shared host's per-account resource limits when we tried building
# on the server, which left `.next` empty and Passenger crash-looping.
# The server now only copies files and installs a handful of lightweight
# production dependencies (next/react/react-dom) — no compilation.
#
# >>> BEFORE EVERY DEPLOY, run this locally and push the result: <<<
#   cd web && npm run build && git add -A ../web/.next && git commit -m "Update build" && git push
#
# Prerequisites (one-time, done in cPanel's UI before the first deploy):
#   1. "Setup Node.js App" -> create an app with:
#        - Node.js version: match NODE_VERSION below (e.g. 20)
#        - Application mode: Production
#        - Application root: match APP_ROOT below (path is relative to $HOME)
#        - Application URL: mytuto.org (add a www -> non-www redirect
#          separately in cPanel's Domains tool if you want both to resolve)
#        - Application startup file: server.js
#      Then click "Create". cPanel provisions a matching nodevenv used below.
#   2. "Git Version Control" -> create/clone this repository, tracking the
#      `main` branch, then use "Manage" -> "Pull or Deploy" to trigger a
#      deploy (or enable automatic deployment on push, if supported).
#   3. Edit APP_ROOT / NODE_VERSION below to exactly match what you chose
#      in step 1 — cPanel will not derive these automatically.
#
# What this does on every deploy:
#   - Copies the web/ app (including the pre-built .next/) into the
#     Node.js app's root
#   - Installs only production dependencies (next, react, react-dom) using
#     the app's own Node version (via cPanel's nodevenv) — a light install,
#     not the full dev toolchain
#   - Touches tmp/restart.txt so Passenger picks up the new build
#
# --- Backend (Laravel API) ---
# Deployed to ~/api-backend, served by the api.mytuto.org subdomain whose
# document root points at ~/api-backend/public (not the app root — keeps
# .env, app/, vendor/ etc. outside what's web-accessible).
#
# Prerequisites (one-time, done manually before the first deploy):
#   1. Subdomain api.mytuto.org created, document root set to
#      ~/api-backend/public
#   2. MultiPHP Manager -> api.mytuto.org set to PHP 8.3+ (this server's
#      default `php`/`composer` resolve to 8.2, below composer.json's
#      ^8.3 requirement — that's why PHP_BIN below is an explicit
#      versioned path, not just `php`)
#   3. ~/api-backend/.env created manually via Terminal — NOT committed
#      to git (contains real DB credentials). Not overwritten by deploy
#      (backend/.env is gitignored, so the cp step below never touches it)
#
# composer install (not a committed vendor/) is attempted here first,
# unlike the frontend's pre-built .next — Laravel's dependency tree is
# much lighter than the Node toolchain that got OOM/CPU-killed on this
# host. If this ever fails/hangs the same way, switch to committing a
# locally-built vendor/ and drop the composer step, mirroring web/.next.

deployment:
  tasks:
    - export APP_ROOT=MyTuto
    - export NODE_VERSION=20
    - export DEPLOYPATH=$HOME/$APP_ROOT
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R web/. $DEPLOYPATH
    - /bin/rm -rf $DEPLOYPATH/node_modules
    - source $HOME/nodevenv/$APP_ROOT/$NODE_VERSION/bin/activate
    - cd $DEPLOYPATH
    - npm ci --omit=dev
    - deactivate
    - /bin/mkdir -p $DEPLOYPATH/tmp
    - /bin/touch $DEPLOYPATH/tmp/restart.txt

    - export API_APP_ROOT=api-backend
    - export API_PHP_BIN=/opt/cpanel/ea-php83/root/usr/bin/php
    - export API_DEPLOYPATH=$HOME/$API_APP_ROOT
    - /bin/mkdir -p $API_DEPLOYPATH
    - /bin/cp -R backend/. $API_DEPLOYPATH
    - /bin/rm -rf $API_DEPLOYPATH/vendor
    - $API_PHP_BIN /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --working-dir=$API_DEPLOYPATH
    - /bin/chmod -R 775 $API_DEPLOYPATH/storage $API_DEPLOYPATH/bootstrap/cache
    - $API_PHP_BIN $API_DEPLOYPATH/artisan migrate --force
    - $API_PHP_BIN $API_DEPLOYPATH/artisan config:clear
    - $API_PHP_BIN $API_DEPLOYPATH/artisan storage:link
